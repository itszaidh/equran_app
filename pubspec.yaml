name: equran
description: "Application for reading the Holy Quran"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 3.3.0-beta.6+94
environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: ">=3.41.7"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  home_widget: ^0.9.2
  workmanager: ^0.9.0

  collection: ^1.19.1
  google_fonts: ^8.0.2
  quran:
    path: third_party/quran_lite
  vibration: ^3.1.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  adaptive_theme: ^3.7.2
  percent_indicator: ^4.2.5
  like_button: ^2.1.0
  audioplayers: ^6.6.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  flutter_carousel_widget: ^3.1.0
  dynamic_height_grid_view: ^0.0.4
  archive: ^4.0.9
  crypto: ^3.0.7
  http: ^1.6.0
  path_provider: ^2.1.5
  package_info_plus: ^9.0.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  adhan_dart: ^2.0.1
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geocoding: ^4.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  flutter_compass: ^0.8.1
  foil:
    path: third_party/foil
  just_audio_media_kit: ^2.1.0
  media_kit: ^1.2.6
  media_kit_libs_linux: ^1.2.1
  just_audio_windows: ^0.2.3
dependency_overrides:
  analyzer: ^13.0.0
  meta: ^1.18.2
  dart_style: ^3.1.9
  build: any
  build_resolvers: any
  build_runner: any
  source_gen: any
  hive_generator: any
  geolocator_android:
    git:
      url: https://github.com/Zverik/flutter-geolocator.git
      ref: floss
      path: geolocator_android

dev_dependencies:
  analyzer: ^13.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  dependency_validator: ^5.0.0
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/data/quran/text/uthmani/
    - assets/data/quran/text/indopak/
    - assets/data/quran/translations/en_saheeh/
    - assets/data/transliteration/quran_en_transliteration.json
    - assets/data/dua/asma_al_husna.json
    - assets/data/dua/daily_hadith_duas.json
    - assets/data/dua/hisn/index.json
    - assets/data/dua/hisn/categories/
    - assets/media/images/app/

  fonts:
    - family: Hafs
      fonts:
        - asset: assets/media/fonts/Hafs.ttf
    - family: QuranIndoPak
      fonts:
        - asset: assets/media/fonts/QuranIndoPak.ttf

