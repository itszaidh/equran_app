name: equran
description: "Application for reading the Holy Quran"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.3.1+22
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  quran: ^1.4.1
  vibration: ^3.1.6
  hive: ^2.2.3
  hive_flutter:
  hive_generator:
  build_runner:
  provider:
  adaptive_theme: ^3.6.0
  percent_indicator:
  numberpicker:
  like_button: ^2.0.5
  simple_gesture_detector: ^0.2.1
  flutter_svg: ^2.0.10+1
  audioplayers: ^6.4.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  flutter_carousel_widget: ^3.1.0
  dynamic_height_grid_view: ^0.0.4
  scrollable_positioned_list: ^0.3.8
  expansion_tile_group: ^2.3.0
  http: ^1.5.0
  path_provider: ^2.1.5
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  dependency_validator: ^4.0.0
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/index.json
    - assets/images/quran.svg

  fonts:
    - family: Hafs
      fonts:
        - asset: assets/fonts/Hafs.ttf
