workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release --no-tree-shake-icons --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa