name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        run: flutter pub get

  version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.app_version }}
      release_version: ${{ steps.get_version.outputs.release_version }}
      release_tag: ${{ steps.get_version.outputs.release_tag }}
      release_name: ${{ steps.get_version.outputs.release_name }}
      prerelease: ${{ steps.get_version.outputs.prerelease }}
      make_latest: ${{ steps.get_version.outputs.make_latest }}
      should_run: ${{ steps.check_tag.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          RELEASE_VERSION="${VERSION%%+*}"
          RELEASE_TAG="v${RELEASE_VERSION}"

          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            PRERELEASE_LABEL="${RELEASE_VERSION#*-}"
            RELEASE_NAME="Pre-release ${RELEASE_TAG}"
            PRERELEASE="true"
            MAKE_LATEST="false"
          else
            RELEASE_NAME="Release ${RELEASE_TAG}"
            PRERELEASE="false"
            MAKE_LATEST="true"
          fi

          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Validate Release Tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.release_tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Expected tag ${RELEASE_TAG} for pubspec version, got ${GITHUB_REF_NAME}."
            exit 1
          fi

      - id: check_tag
        name: Check If Release Tag Already Exists
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists on origin. Skipping build/release jobs."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${RELEASE_TAG} is new. Build/release jobs will run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: [version, quality]
    if: needs.version.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/keystore.jks
          EOF

      - name: Build Android Split APKs
        run: flutter build apk --release --split-per-abi
        shell: bash

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-split
          path: build/app/outputs/flutter-apk/app-*-release.apk

  build-linux:
    needs: [version, quality]
    if: needs.version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux Build
        run: |
          cd build/linux/x64/release
          zip -r linux-release.zip bundle

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/linux-release.zip

  build-windows:
    needs: [version, quality]
    if: needs.version.outputs.should_run == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows Build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/windows-release.zip -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: build/windows/windows-release.zip

  release:
    needs: [version, quality, build-android, build-linux, build-windows]
    if: needs.version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          name: ${{ needs.version.outputs.release_name }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          make_latest: ${{ needs.version.outputs.make_latest }}
          generate_release_notes: true
          files: |
            dist/android-apk-split/app-*-release.apk
            dist/linux-bundle/linux-release.zip
            dist/windows-bundle/windows-release.zip
